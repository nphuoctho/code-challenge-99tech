<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fancy Form</title>

    <link href="src/style.css" rel="stylesheet" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="min-h-screen px-3 sm:px-0 bg-background flex items-center justify-center transition-colors duration-300"
  >
    <!-- Dark mode toggle -->
    <button
      id="theme-toggle"
      aria-label="Toggle theme"
      class="fixed top-4 right-4 z-50 p-2.5 rounded-full bg-card border border-border text-foreground hover:bg-muted transition-all duration-200 cursor-pointer"
    >
      <svg
        id="icon-sun"
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="hidden"
      >
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
      <svg
        id="icon-moon"
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    </button>

    <!-- Swap Card -->
    <div
      class="bg-card border rounded-xl py-5 px-3 sm:p-6 w-full max-w-xl relative shadow-lg dark:shadow-black/40 transition-colors duration-300"
    >
      <!-- Header -->
      <div class="flex items-center justify-between mb-3 sm:mb-5">
        <h1 class="text-xl font-semibold text-foreground">Swap</h1>
        <button
          id="settings-btn"
          aria-label="Settings"
          class="p-1.5 rounded-lg text-muted-foreground hover:text-foreground hover:bg-muted transition-colors cursor-pointer"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.07 4.93a10 10 0 0 1 0 14.14M14.12 2.06A10 10 0 0 1 21.94 9.88M9.88 21.94A10 10 0 0 1 2.06 14.12M4.93 19.07a10 10 0 0 1 0-14.14M9.88 2.06A10 10 0 0 1 2.06 9.88M14.12 21.94A10 10 0 0 1 21.94 14.12"
            />
          </svg>
        </button>
      </div>

      <!-- From Token Panel -->
      <div
        class="bg-panel border border-border rounded-lg py-5 px-4 sm:py-6 sm:px-5 focus-within:border-primary/40 transition-colors"
      >
        <div class="flex items-center justify-between mb-3">
          <!-- Token selector -->
          <button
            id="from-token-btn"
            aria-haspopup="listbox"
            class="flex items-center gap-2 pl-1.5 pr-3 py-1.5 rounded-full bg-card border border-border hover:bg-muted hover:border-primary/30 active:scale-95 transition-all cursor-pointer outline-none"
          >
            <div
              id="from-icon"
              class="w-8 h-8 rounded-full overflow-hidden bg-muted border border-border flex items-center justify-center shrink-0"
            >
              <div
                class="w-full h-full rounded-full bg-border animate-pulse-fade"
              ></div>
            </div>
            <span
              id="from-symbol"
              class="text-[0.9375rem] font-semibold text-foreground whitespace-nowrap"
              >Select</span
            >
            <svg
              class="text-muted-foreground shrink-0"
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </button>
          <!-- Amount input -->
          <input
            type="number"
            id="from-amount"
            placeholder="0.00"
            min="0"
            step="any"
            class="flex-1 min-w-0 max-w-50 bg-transparent border-none outline-none text-right text-[1.75rem] font-semibold text-foreground placeholder:text-muted-foreground/60"
            style="font-family: var(--font-sans)"
          />
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-1.5">
            <span class="text-sm text-muted-foreground">Balance:</span>
            <span
              id="from-balance"
              class="text-sm text-muted-foreground font-medium"
              >—</span
            >
            <button
              id="from-max-btn"
              class="text-[0.7rem] font-bold uppercase tracking-widest text-primary bg-primary/10 border border-primary/25 rounded px-[0.45rem] py-[0.15rem] hover:bg-primary/20 transition-colors cursor-pointer"
            >
              Max
            </button>
          </div>
          <span id="from-usd" class="text-sm text-muted-foreground"
            >≈$ 0.00</span
          >
        </div>
      </div>

      <!-- Swap Direction Button -->
      <div class="flex justify-center -my-4 relative z-10">
        <button
          id="swap-direction-btn"
          aria-label="Swap tokens"
          class="spin w-11 h-11 rounded-full bg-card border-[3px] border-background ring-1 ring-border text-muted-foreground flex items-center justify-center hover:bg-muted hover:text-foreground hover:scale-105 active:scale-95 transition-all cursor-pointer"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="17 1 21 5 17 9" />
            <path d="M3 11V9a4 4 0 0 1 4-4h14" />
            <polyline points="7 23 3 19 7 15" />
            <path d="M21 13v2a4 4 0 0 1-4 4H3" />
          </svg>
        </button>
      </div>

      <!-- To Token Panel -->
      <div
        class="bg-panel border border-border rounded-lg py-5 px-4 sm:py-6 sm:px-5 transition-colors"
      >
        <div class="flex items-center justify-between mb-3">
          <button
            id="to-token-btn"
            aria-haspopup="listbox"
            class="flex items-center gap-2 pl-1.5 pr-3 py-1.5 rounded-full bg-card border border-border hover:bg-muted hover:border-primary/30 active:scale-95 transition-all cursor-pointer outline-none"
          >
            <div
              id="to-icon"
              class="w-8 h-8 rounded-full overflow-hidden bg-muted border border-border flex items-center justify-center shrink-0"
            >
              <div
                class="w-full h-full rounded-full bg-border animate-pulse-fade"
              ></div>
            </div>
            <span
              id="to-symbol"
              class="text-[0.9375rem] font-semibold text-foreground whitespace-nowrap"
              >Select</span
            >
            <svg
              class="text-muted-foreground shrink-0"
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </button>
          <input
            type="number"
            id="to-amount"
            placeholder="0.00"
            readonly
            tabindex="-1"
            class="flex-1 min-w-0 max-w-50 bg-transparent border-none outline-none text-right text-[1.75rem] font-semibold text-muted-foreground placeholder:text-muted-foreground/60"
            style="font-family: var(--font-sans)"
          />
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-1.5">
            <span class="text-sm text-muted-foreground">Balance:</span>
            <span
              id="to-balance"
              class="text-sm text-muted-foreground font-medium"
              >—</span
            >
          </div>
          <span id="to-usd" class="text-sm text-muted-foreground">≈$ 0.00</span>
        </div>
      </div>

      <!-- Exchange Rate -->
      <div class="flex justify-end mt-3 mb-4">
        <span
          id="exchange-rate"
          class="text-xs font-semibold text-muted-foreground"
          >—</span
        >
      </div>

      <!-- Error message -->
      <div
        id="error-msg"
        class="hidden text-sm text-destructive text-center mb-3 px-3 py-2 rounded-lg bg-destructive/10 border border-destructive/20"
      ></div>

      <!-- Swap Button -->
      <button
        id="swap-btn"
        disabled
        class="w-full py-4 rounded-lg bg-primary text-primary-foreground font-bold text-base tracking-wide flex items-center justify-center gap-2 hover:opacity-90 hover:-translate-y-px active:translate-y-0 disabled:opacity-45 disabled:cursor-not-allowed disabled:translate-y-0 transition-all cursor-pointer outline-none"
      >
        <span id="swap-btn-text">Select tokens</span>
        <div id="swap-btn-spinner" class="hidden animate-spin-btn"></div>
      </button>
    </div>

    <!-- Token Selector Modal -->
    <div
      id="token-modal"
      class="hidden fixed inset-0 z-50 items-center justify-center p-4"
      role="dialog"
      aria-modal="true"
      aria-label="Select token"
    >
      <!-- Overlay -->
      <div
        id="modal-overlay"
        class="absolute inset-0 bg-black/50 backdrop-blur-sm"
      ></div>

      <!-- Content -->
      <div
        class="animate-modal-in relative z-10 bg-popover border border-border rounded-xl w-full max-w-105 max-h-[80vh] flex flex-col overflow-hidden shadow-2xl"
      >
        <!-- Modal header -->
        <div
          class="flex items-center justify-between px-5 py-4 border-b border-border"
        >
          <h2 class="text-base font-semibold text-foreground">Select token</h2>
          <button
            id="modal-close"
            class="p-1.5 rounded-lg text-muted-foreground hover:text-foreground hover:bg-muted transition-colors cursor-pointer"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <!-- Search -->
        <div class="px-5 py-3 border-b border-border relative">
          <svg
            class="absolute left-8 top-1/2 -translate-y-1/2 text-muted-foreground pointer-events-none"
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="text"
            id="token-search"
            placeholder="Search by name or symbol..."
            autocomplete="off"
            class="w-full pl-9 pr-3 py-2.5 bg-muted border border-border rounded-xl text-sm text-foreground placeholder:text-muted-foreground outline-none focus:border-primary/50 transition-colors"
            style="font-family: var(--font-sans)"
          />
        </div>

        <!-- Token list -->
        <div
          id="token-list"
          class="token-list overflow-y-auto flex-1 p-2"
          role="listbox"
        ></div>
      </div>
    </div>

    <script type="module" src="src/main.ts"></script>
  </body>
</html>
